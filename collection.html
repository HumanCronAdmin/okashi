<script src="js/app.js"></script>
<script>
document.getElementById('nav').innerHTML = renderNav('collection');

let filterMode = 'all';

function updateStats() {
  const count = SA.getCollectedCount();
  const total = SA.snacks.length;
  const pct = total > 0 ? (count / total * 100).toFixed(0) : 0;
  document.getElementById('count').textContent = count;
  document.getElementById('total').textContent = total;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderCollection() {
  let snacks = SA.snacks;
  if (filterMode === 'tried') snacks = snacks.filter(s => SA.isCollected(s.id));
  else if (filterMode === 'untried') snacks = snacks.filter(s => !SA.isCollected(s.id));

  const grid = document.getElementById('collection-grid');
  grid.innerHTML = snacks.map(s => SA.renderSnackCard(s)).join('');
  SA.bindTriedButtons(grid);
  updateStats();
}

document.addEventListener('sa:collected-changed', () => { updateStats(); });

['all','tried','untried'].forEach(mode => {
  document.getElementById('show-' + mode).addEventListener('click', () => {
    filterMode = mode;
    document.querySelectorAll('#show-all,#show-tried,#show-untried').forEach(b => {
      b.className = 'btn btn-sm btn-outline';
    });
    document.getElementById('show-' + mode).className = 'btn btn-sm';
    document.getElementById('show-' + mode).style.background = 'var(--text)';
    document.getElementById('show-' + mode).style.color = '#fff';
    renderCollection();
  });
});

SA.loadSnacks().then(() => renderCollection());
</script>
