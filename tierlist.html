<section class="section" style="padding-top:24px">
  <div class="container">
    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:8px;text-align:center">Japanese Snack Tier List</h1>
    <p style="text-align:center;color:#666;margin-bottom:20px">Drag snacks into tiers to rank them. Export and share your list.</p>

    <div class="tierlist-container" id="tierlist">
      <div class="tier-row"><div class="tier-label tier-s">S</div><div class="tier-items" data-tier="S"></div></div>
      <div class="tier-row"><div class="tier-label tier-a">A</div><div class="tier-items" data-tier="A"></div></div>
      <div class="tier-row"><div class="tier-label tier-b">B</div><div class="tier-items" data-tier="B"></div></div>
      <div class="tier-row"><div class="tier-label tier-c">C</div><div class="tier-items" data-tier="C"></div></div>
      <div class="tier-row"><div class="tier-label tier-d">D</div><div class="tier-items" data-tier="D"></div></div>
    </div>

    <div class="tier-pool" id="pool">
      <div class="tier-pool-label">Drag snacks from here into the tiers above</div>
    </div>

    <div style="text-align:center;margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" id="export-btn">Export as Image</button>
      <button class="btn btn-outline" id="reset-btn">Reset</button>
    </div>
    <div style="text-align:center;margin-top:12px;display:none;flex-wrap:wrap;gap:10px;justify-content:center" id="share-row">
      <a id="share-x" href="#" target="_blank" class="btn btn-sm btn-outline">Share on X</a>
      <a id="share-reddit" href="#" target="_blank" class="btn btn-sm btn-outline">Share on Reddit</a>
    </div>

    <canvas id="export-canvas" style="display:none"></canvas>
    <div id="export-preview" style="text-align:center;margin-top:16px"></div>
  </div>
</section>
